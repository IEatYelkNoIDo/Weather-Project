<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>

        <h1> {{ official_city }} </h1>
        <h2> Weather </h2>
            <form action="{% url 'city' %}" method="GET">
                <input type="hidden" name="city" value="{{ city }}">
                
                <button type="submit" class="btn btn-primary" name="unit" value="imperial">Imperial</button>
                <button type="submit" class="btn btn-success" name="unit" value="metric">Metric</button>
            </form>
            {% for key, value in weather.items %}
            
                <p> {{ key }}: {{ value }} <p>

            {% endfor %}
    </body>


    <form action="{% url 'home' %}">
        <button type="submit" class="btn btn-info" name="unit" value="imperial">HOME</button>
    </form>

</html>
