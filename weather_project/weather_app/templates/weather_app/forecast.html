<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>

        <h1> {{ official_city }} </h1>
        <h2> Weather Forecast </h2>
            <form action="{% url 'forecast' %}" method="GET">
                <input type="hidden" name="city" value="{{ city }}">
                <input type="hidden" name="unit" value="{{ unit }}">
                
                <button type="submit" class="btn btn-primary" name="unit" value="imperial">Imperial</button>
                <button type="submit" class="btn btn-success" name="unit" value="metric">Metric</button>
            </form>
            {% for hour in forecast.hour %}
                {% if unit == 'imperial'%}
                    <p>Max Temp: {{ hour.temp_f }}°F</p>
                {% else %}
                    <p>Max Temp: {{ hour.temp_c }}°C</p>
                {% endif %}
            {% endfor %}
    </body>


    <form action="{% url 'home' %}">
        <button type="submit" class="btn btn-info" name="unit" value="imperial">HOME</button>
    </form>
    <form action="{% url 'current' %}">
         <input type="hidden" name="city" value="{{ city }}">
         <input type="hidden" name="unit" value="{{ unit }}">
        <button type="submit" class="btn btn-secondary" name="unit" value="unit">CURRENT</button>
    </form>

</html>
